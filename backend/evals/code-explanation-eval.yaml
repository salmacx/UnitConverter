# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Unit conversion JSON extraction eval"

prompts:
-  |
  Extract structured conversion data from user input.
  Return valid JSON only with keys: value, from_unit, to_unit.
  User input: {{input}}

providers:
  - "ollama:chat:llama3.1:latest"
  - "ollama:chat:llama3.2:latest"
  - "ollama:chat:phi3:mini"
  - "ollama:chat:qwen2:0.5b"
tests:
  - vars:
      input: "convert 10 kg to lbs"
    assert:
      - type: icontains
        value: '"value"'
      - type: icontains
        value: '"from_unit"'
      - type: icontains
        value: '"to_unit"'
      - type: icontains
        value: "kg"
      - type: icontains
        value: "lbs"

  - vars:
      input: "How many Fahrenheit is 37 C?"
    assert:
      - type: icontains
        value: "37"
      - type: icontains
        value: "c"
      - type: icontains
        value: "f"

  - vars:
      input: "please convert 5 miles per hour to km/h"
    assert:
      - type: icontains
        value: "5"
      - type: icontains
        value: "mph"
      - type: icontains
        value: "km/h"