# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Code explanation eval"

prompts:
  - "Explain what this code does in one sentence: {{code}}"
  - "Explain this code to a beginner in simple terms: {{code}}"

providers:
  - "ollama:chat:tinyllama"
  - "ollama:chat:phi3:mini"
  - "ollama:chat:qwen2:0.5b"

tests:
  - vars:
      code: "for i in range(10): print(i)"
    assert:
      - type: icontains
        value: "print"
      - type: javascript
        value: "output.length < 300 ? 1 : 0"

  - vars:
      code: "result = [x**2 for x in range(5)]"
    assert:
      - type: icontains
        value: "square"
      - type: javascript
        value: 1 / (output.length + 1)

  - vars:
      code: "def greet(name): return f'Hello, {name}!'"
    assert:
      - type: icontains
        value: "function"
      - type: llm-rubric
        value: ensure the explanation is understandable to a beginner
        provider: "ollama:chat:phi3:mini"